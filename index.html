<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundan Cars</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        .owner {
            font-size: 18px;
            margin-top: 5px;
            color: #ffcc00;
        }
        .container {
            padding: 20px;
        }
        .car {
            background: white;
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .car img {
            width: 100%;
            border-radius: 10px;
        }
        .car h2 {
            margin: 10px 0;
        }
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Kundan Cars</h1>
    <div class="owner">Owner: Kundan Singh Rajpurohit</div>
</header>

<div class="container">

    <div class="car">
        <img src="https://via.placeholder.com/400x200" alt="Car 1">
        <h2>Luxury Sedan</h2>
        <p>Price: ₹10,00,000</p>
        <p>Comfortable and stylish car for family use.</p>
    </div>

    <div class="car">
        <img src="https://via.placeholder.com/400x200" alt="Car 2">
        <h2>Sports Car</h2>
        <p>Price: ₹25,00,000</p>
        <p>High speed and premium performance.</p>
    </div>

    <div class="car">
        <img src="https://via.placeholder.com/400x200" alt="Car 3">
        <h2>SUV</h2>
        <p>Price: ₹15,00,000</p>
        <p>Perfect for long drives and rough roads.</p>
    </div>

</div>

<footer>
    <p>© 2026 Kundan Cars | All Rights Reserved</p>
</footer>

</body>
</html>
